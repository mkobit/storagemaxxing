name: Beads validation
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup mise
        uses: jdx/mise-action@5483bbfe095d33f784400df73273e970e5b88237

      - name: Bootstrap beads database
        run: bd bootstrap --yes --sandbox

      - name: Verify beads database
        run: bd list --json
          
      - name: Lint issues
        run: bd lint
