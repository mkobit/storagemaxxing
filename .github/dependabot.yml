version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 14
    groups:
      ui:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "three"
          - "@types/three"
      typescript:
        patterns:
          - "typescript"
          - "bun-types"
          - "@types/node"
      build:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "globals"
          - "@stylistic/*"
          - "prettier"
          - "vite"
          - "@vitejs/*"
      functional-libs:
        patterns:
          - "zod"
          - "idb-keyval"
          - "zustand"
          - "glpk.js"
          - "maxrects-packer"
          - "gl-matrix"
          - "@types/gl-matrix"
      other:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
    groups:
      actions:
        patterns:
          - "*"
