version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      all-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 14
      semver-patch-days: 14

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 14
      semver-patch-days: 14
